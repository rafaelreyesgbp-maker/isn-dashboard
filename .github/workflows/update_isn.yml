name: Actualizar Dashboard ISN

on:
  schedule:
    # Lunes a viernes cada 2 horas laborales: 9, 11, 13, 15, 17 hrs México (UTC-5 verano)
    - cron: '0 14,16,18,20,22 * * 1-5'
  workflow_dispatch:   # permite ejecutar manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests xlrd

      - name: Actualizar datos desde Drive
        run: python update_dashboard.py

      - name: Crear index.html para GitHub Pages
        run: cp isn_dashboard_live.html index.html

      - name: Commit y push del HTML actualizado
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Auto-update: datos ISN ${{ github.run_id }}'
          default_author: github_actions
          add: 'isn_dashboard_live.html index.html'
