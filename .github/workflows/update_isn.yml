name: Actualizar Dashboard ISN

on:
  schedule:
    # Lunes a viernes a las 7:00 AM hora México (UTC-6 → 13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:   # permite ejecutar manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests xlrd

      - name: Actualizar datos desde Drive
        run: python update_dashboard.py

      - name: Commit y push del HTML actualizado
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Auto-update: datos ISN ${{ github.run_id }}'
          default_author: github_actions
          add: 'isn_dashboard_live.html'

      - name: Preparar carpeta de deploy
        run: |
          mkdir -p deploy
          cp isn_dashboard_live.html deploy/index.html

      - name: Deploy a Netlify
        run: npx netlify-cli@latest deploy --prod --dir deploy --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
